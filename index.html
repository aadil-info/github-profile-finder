<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Profile Finder</title>
    <!-- Use Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <header class="header">
            <i class="fab fa-github logo"></i>
            <h1>DevFinder</h1>
        </header>

        <div class="search-bar">
            <i class="fas fa-search search-icon"></i>
            <input type="text" id="search-input" placeholder="Search GitHub username..." autocomplete="off">
            <button id="search-button">Search</button>
        </div>

        <div id="loading" class="hidden">
            <div class="spinner"></div>
            <p>Fetching profile...</p>
        </div>

        <div id="error-message" class="hidden">
            <p>No user found with the given username.</p>
        </div>

        <main id="main-container">
            <!-- Profile Card Will Be Injected Here via JavaScript -->
        </main>
    </div>

    <script src="script.js"></script>
</body>

</html>
